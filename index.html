<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Clock</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      box-sizing: border-box;
    }

    #main {
      background: url('https://i.ibb.co/TMkWt12c/pngtree-modern-double-color-futuristic-neon-background-image-351866.jpg') no-repeat center center fixed;
      background-size: cover;
      backdrop-filter: blur(100px);
      color: white;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #container {
      backdrop-filter: blur(20px);
      width: 65vw;
      height: auto;
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
      margin-top: 5%;
    }

    #tittle {
      font-size: 40px;
      color: #0ff;
      text-shadow: 0 0 5px #0ff, 0 0 10px #0ff, 0 0 20px #0ff;
      margin-bottom: 20px;
    }

    .box h1.time {
      font-size: 3rem;
      color: #fff;
      text-shadow: 0 0 5px #0ff, 0 0 10px #0ff, 0 0 20px #0ff;
    }

    .dot {
      font-size: 2.5rem;
      color: #ff00ff;
      text-shadow: 0 0 5px #f0f, 0 0 10px #f0f, 0 0 20px #f0f;
      margin: 0 15px;
    }

    .box p {
      font-size: 0.8rem;
      color: #fff;
      text-shadow: 0 0 3px #fff;
    }

#s {
  position: absolute;
  top: 25px;
  right: -39px;
  font-size: 1.2rem;
  color: #00ff99;
  font-weight: bold;
  text-shadow: 0 0 5px #0f9, 0 0 10px #0f9;
}

    #clo {
      display: flex;
      align-items: center;
      justify-content: center;
      postion: relative;
    }

    #date, #day {
      margin-top: 15px;
      font-size: 2rem;
      color: #ff00ff;
      text-shadow: 0 0 5px #fff, 0 0 10px #0ff;
    }   
        .made-by {
      margin-top: 15px;
      font-size: 20px;
      color: yellow;
      text-shadow: 0 0 5px #fff, 0 0 10px #0ff;
      font-family: Cursive;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="main">
    <h1 id="tittle">Digital Clock</h1>
    <div id="container">
      <div id="clo">
        <div class="box">
          <h1 class="time" id="hour">00</h1>
          <p>Hours</p>
        </div>
        <div class="dot">:</div>
        <div class="box">
          <h1 class="time" id="minute">00</h1>
          <p>Minutes</p>
        </div>
        <div class="dot">:</div>
        <div class="box">
          <h1 class="time" id="second">00</h1>
          <p>Seconds</p>
        </div>
        <span id="s">AM</span>
      </div>
      <p id="date"></p>
      <p id="day"></p>
    </div>
  <div class="made-by">Made by: Adarsh Vishwakarma</div>
    </div>

  <script>
    function displayTime() {
      const time = new Date();
      let hour = time.getHours();
      const minute = time.getMinutes();
      const second = time.getSeconds();

      const session = document.getElementById("s");
      if (hour >= 12) {
        session.innerText = "PM";
        hour = hour > 12 ? hour - 12 : hour;
      } else {
        session.innerText = "AM";
      }

      document.getElementById("hour").innerText = String(hour).padStart(2, "0");
      document.getElementById("minute").innerText = String(minute).padStart(2, "0");
      document.getElementById("second").innerText = String(second).padStart(2, "0");

      const dayList = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
      const day = dayList[time.getDay()];
      const dateStr = `${String(time.getDate()).padStart(2, "0")}/${
        String(time.getMonth() + 1).padStart(2, "0")
      }/${time.getFullYear()}`;

      document.getElementById("date").innerText = dateStr;
      document.getElementById("day").innerText = day;
    }

    setInterval(displayTime, 1000);
    displayTime();
  </script>
</body>
</html>
